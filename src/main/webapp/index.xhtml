<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
    <title>Calculadora de Obra</title>
</h:head>

<h:body>

    <h:form>

        <h2>Cadastro de Cômodo</h2>

        <h:outputLabel value="Nome do cômodo:" />
        <h:inputText value="#{obraBean.nomeComodo}" />

        <br/><br/>

        <h:outputLabel value="Largura (m):" />
        <h:inputText value="#{obraBean.largura}" />

        <br/><br/>

        <h:outputLabel value="Comprimento (m):" />
        <h:inputText value="#{obraBean.comprimento}" />

        <br/><br/>

        <h:commandButton value="Adicionar Cômodo"
                         action="#{obraBean.adicionarComodo}" />

        <br/><br/>

        <h:commandButton value="Calcular Obra"
                         action="#{obraBean.calcular}" />

    </h:form>

    <hr/>

    <h3>Resultado</h3>

    <h:outputText value="Tijolos: #{obraBean.resultado.tijolos}" />
    <br/>
    <h:outputText value="Concreto: #{obraBean.resultado.concreto}" />

</h:body>
</html>
